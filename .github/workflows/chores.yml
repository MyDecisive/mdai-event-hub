name: Chores

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go mod and build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: |
          go mod download

      - name: Check module tidiness
        run: |
          make tidy-check

      - name: Extract golangci-lint version
        id: extract_golangci_lint_version
        shell: bash
        run: |
          if [ ! -f .toolenv ]; then
            echo "::error file=.toolenv,title=MISSING::❌ CRITICAL: .toolenv file not found."
            exit 1
          fi
          set -a
          source .toolenv
          set +a
          if [ -z "${GOLANGCI_LINT_VERSION:-}" ]; then
            echo "::error file=.toolenv,title=GOLANGCI_LINT_VERSION-MISSING::❌ CRITICAL: .toolenv is missing a value for GOLANGCI_LINT_VERSION."
            echo "Please ensure .toolenv is present and GOLANGCI_LINT_VERSION is set."
            exit 1
          fi
          echo "ℹ️ Using golangci-lint version v${GOLANGCI_LINT_VERSION}"
          echo "golangci_version=v${GOLANGCI_LINT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          install-mode: "binary"
          version: ${{ steps.extract_golangci_lint_version.outputs.golangci_version }}

      - name: Running Tests
        run: |
          CGO_ENABLED=0 go test -cover -coverprofile=coverage.txt -v -count=1 ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}