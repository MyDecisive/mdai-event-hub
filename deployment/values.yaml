  nodeSelector: {}
  affinity: {}
  annotations: {}
image:
  repository: public.ecr.aws/p3k6k6h3/mdai-event-hub
  # tag: 0.0.1

service:
  name: mdai-event-hub
  port: 8082
  targetPort: 8082
  type: ClusterIP
